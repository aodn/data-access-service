# Order of values under each key matters, do not change it. Else you will get test errors.
column_name_mapping:
  time:
    - TIME
    - time
    - JULD
    - eventDate
    - detection_timestamp
    - timestamp
  depth:
  latitude:
    - LATITUDE
    - latitude
    - lat
    # add this for data-uplift aggregated datasets for co-index
    - decimalLatitude
    - release_latitude
    - ssm_lat
  longitude:
    - LONGITUDE
    - longitude
    - lon
    # add this for data-uplift aggregated datasets for co-index
    - decimalLongitude
    - release_longitude
    - ssm_lon
parquet:
  config:
    duckdb_database: "parquet_disk_db.duckdb"
    duckdb_temp_dir: "parquet_duckdb_tmp"
    memory_limit: "800M"
    threads: 8
    region: "ap-southeast-2"
    extensions:
      - httpfs
      - json
pmtiles:
  config:
    output_pmtiles_dir: "portal/pmtiles/output"
    staged_parquet_dir: "portal/pmtiles/parquet_staged"
    geojsonseq_dir: "geojsonseq_tmp"
    duckdb_temp_dir: "duckdb_tmp"
    duckdb_database: "disk_db.duckdb"
    memory_limit: "4G"
    threads: 8
    fetch_size: 50000
    # Periodic DuckDB query progress logs (via query_progress + Python logger)
    show_progress: True
    # Temporal bucket for hexbin counts: "month" (YYYYMM) or "date" (YYYYMMDD).
    time_group_by: date
  layers:
    hex_z0:
      h3_resolution: 2
      minzoom: 0
      maxzoom: 1
    hex_z2:
      h3_resolution: 3
      minzoom: 2
      maxzoom: 3
    hex_z4:
      h3_resolution: 4
      minzoom: 4
      maxzoom: 5
    hex_z6:
      h3_resolution: 6
      minzoom: 6
      maxzoom: 7
    hex_z8:
      h3_resolution: 7
      minzoom: 8
      maxzoom: 9
    hex_z10:
      h3_resolution: 8
      minzoom: 10
      maxzoom: 12
tiler:
  # Local dates in the API are computed in this timezone. Zarr store timestamps
  # are always UTC.
  tile_timezone: "Australia/Sydney"
  # Seconds before a Zarr store is re-opened to pick up newly appended time steps.
  store_ttl_seconds: 600
  # Capacity gate for concurrent store opens during startup prewarm. Bounded to
  # the S3 connection ceiling, not CPU.
  store_prewarm_workers: 6
  # Max concurrent sync route handlers (each cold slice needs one thread).
  # Practical ceiling is S3 bandwidth.
  thread_pool_size: 20
  # Capacity gate for /animation per-frame S3 fan-out. Sized to the aiobotocore
  # S3 connection-pool ceiling (~10/host).
  animation_workers: 10
  # Cache backend for L1 (processed grid) / L2 (slice): "none" disables caching
  # entirely. Any other value needs a CacheBackend implementation wired into
  # memoizer.create_memoizer.
  cache_backend: "none"
  # Per-entry TTL in seconds — unused while cache_backend is "none".
  slice_cache_ttl_seconds: 600
  processed_cache_ttl_seconds: 600
  # True uses anonymous access for s3:// URLs — correct for IMOS's public AODN
  # buckets. False lets fsspec discover AWS credentials for private buckets.
  s3_anon: true
  # Per-socket S3 timeouts (botocore). connect_timeout bounds DNS + TCP/TLS
  # handshake; read_timeout is per-read inactivity, not total request duration.
  s3_connect_timeout: 5
  s3_read_timeout: 30
  s3_max_attempts: 2
