# Order of values under each key matters, do not change it. Else you will get test errors.
column_name_mapping:
  time:
    - TIME
    - time
    - JULD
    - eventDate
    - detection_timestamp
    - timestamp
  depth:
  latitude:
    - LATITUDE
    - latitude
    - lat
    # add this for data-uplift aggregated datasets for co-index
    - decimalLatitude
    - release_latitude
    - ssm_lat
  longitude:
    - LONGITUDE
    - longitude
    - lon
    # add this for data-uplift aggregated datasets for co-index
    - decimalLongitude
    - release_longitude
    - ssm_lon
