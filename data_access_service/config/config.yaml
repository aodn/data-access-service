# Order of values under each key matters, do not change it, look at the _generate_partial_json_array()
column_name_mapping:
  time:
    - TIME
    - time
    - JULD
    - eventDate
    - detection_timestamp
    - timestamp
  depth:
  latitude:
    - LATITUDE
    - latitude
    - lat
    # add this for data-uplift aggregated datasets for co-index
    - decimalLatitude
  longitude:
    - LONGITUDE
    - longitude
    - lon
    # add this for data-uplift aggregated datasets for co-index
    - decimalLongitude
